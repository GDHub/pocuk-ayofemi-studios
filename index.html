      <div style={{ marginTop: 20 }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>Add-ons (optional)</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          {ADDONS.map(a => {
            const sel = (booking.addons || []).includes(a.id);
            return (
              <button key={a.id} onClick={() => {
                const cur = booking.addons || [];
                setBooking({ ...booking, addons: sel ? cur.filter(x => x !== a.id) : [...cur, a.id] });
              }}
                style={{
                  padding: 14, borderRadius: 6,
                  border: `1px solid ${sel ? "var(--ink)" : "var(--line)"}`,
                  background: sel ? "var(--paper-2)" : "transparent",
                  textAlign: "left", display: "flex", flexDirection: "column", gap: 4,
                }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontWeight: 500, fontSize: 14 }}>{a.title}</span>
                  <span style={{ fontSize: 13 }}>+{formatNaira(a.price)}</span>
                </div>
                <div style={{ fontSize: 12, color: "var(--muted)" }}>{a.desc}</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Step 2: Date & Time ──────────────────────────────────────────────────
function StepDateTime({ booking, setBooking }) {
  const [month, setMonth] = React.useState(5); // June (0-indexed)
  const year = 2026;

  // Build month grid
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDay = firstDay.getDay();
  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(null);
  for (let i = 1; i <= daysInMonth; i++) cells.push(i);

  const today = new Date(2026, 4, 25);
  const isPast = (day) => day && new Date(year, month, day) < today;
  // Stub: every 7th day is unavailable
  const isUnavail = (day) => day && (day % 7 === 0);

  const selectDate = (day) => {
    if (isPast(day) || isUnavail(day)) return;
    setBooking({ ...booking, date: `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`, dateLabel: `${MONTH_NAMES[month]} ${day}, ${year}` });
  };

  const selectedDay = booking.date ? parseInt(booking.date.split("-")[2]) : null;
  const selectedMonth = booking.date ? parseInt(booking.date.split("-")[1]) - 1 : null;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 280px", gap: 32 }}>
      <div className="card" style={{ padding: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <button onClick={() => setMonth(m => m - 1)} disabled={month <= 4}
            style={{ fontSize: 18, opacity: month <= 4 ? 0.3 : 1, padding: "6px 12px" }}>←</button>
          <div className="display" style={{ fontSize: 28 }}>{MONTH_NAMES[month]} {year}</div>
          <button onClick={() => setMonth(m => m + 1)} disabled={month >= 11}
            style={{ fontSize: 18, opacity: month >= 11 ? 0.3 : 1, padding: "6px 12px" }}>→</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 8 }}>
          {DAY_NAMES.map(d => (
            <div key={d} className="mono" style={{ textAlign: "center", color: "var(--muted)", padding: "6px 0" }}>{d}</div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {cells.map((day, i) => {
            if (!day) return <div key={i}></div>;
            const past = isPast(day);
            const unavail = isUnavail(day);
            const selected = selectedDay === day && selectedMonth === month;
            return (
              <button key={i} onClick={() => selectDate(day)} disabled={past || unavail}
                style={{
                  aspectRatio: "1/1", borderRadius: 6,
                  background: selected ? "var(--ink)" : "transparent",
                  color: selected ? "var(--paper)" : (past || unavail) ? "var(--muted)" : "var(--ink)",
                  opacity: past ? 0.25 : unavail ? 0.4 : 1,
                  fontSize: 14, fontWeight: 500,
                  cursor: (past || unavail) ? "not-allowed" : "pointer",
                  position: "relative",
                  transition: "background 0.18s",
                  border: "1px solid transparent",
                }}
                onMouseEnter={(e) => !selected && !past && !unavail && (e.currentTarget.style.background = "var(--paper-2)")}
                onMouseLeave={(e) => !selected && (e.currentTarget.style.background = "transparent")}
              >
                {day}
                {unavail && !past && <span style={{ position: "absolute", bottom: 4, left: "50%", transform: "translateX(-50%)", width: 4, height: 4, borderRadius: "50%", background: "var(--muted)" }}></span>}
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 20, paddingTop: 16, borderTop: "1px solid var(--line)", fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, background: "var(--ink)", borderRadius: 2 }}></span> Selected</span>
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 4, height: 4, background: "var(--muted)", borderRadius: "50%" }}></span> Booked</span>
        </div>
      </div>

      <div>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>Available times</div>
        {!booking.date ? (
          <div style={{ padding: "20px 0", fontSize: 13, color: "var(--muted)" }}>Select a date first</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {TIME_SLOTS.map(t => {
              const sel = booking.time === t;
              const unavail = t === "13:00";
              return (
                <button key={t} onClick={() => !unavail && setBooking({ ...booking, time: t })} disabled={unavail}
                  style={{
                    padding: "14px 16px", borderRadius: 6,
                    border: `1px solid ${sel ? "var(--ink)" : "var(--line)"}`,
                    background: sel ? "var(--ink)" : "transparent",
                    color: sel ? "var(--paper)" : unavail ? "var(--muted)" : "var(--ink)",
                    textAlign: "left", display: "flex", justifyContent: "space-between",
                    opacity: unavail ? 0.4 : 1, cursor: unavail ? "not-allowed" : "pointer",
                    transition: "all 0.18s",
                  }}>
                  <span style={{ fontWeight: 500 }}>{t}</span>
                  <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                    {unavail ? "Booked" : sel ? "Selected" : "Available"}
                  </span>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Step 3: Details ──────────────────────────────────────────────────────
function StepDetails({ booking, setBooking, user }) {
  React.useEffect(() => {
    if (user && !booking.name) {
      setBooking({ ...booking, name: user.name, email: user.email });
    }
  }, [user]);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
      <Field label="Full name" value={booking.name || ""} onChange={v => setBooking({ ...booking, name: v })} placeholder="Ayọkunle Adeyemi" />
      <Field label="Email" type="email" value={booking.email || ""} onChange={v => setBooking({ ...booking, email: v })} placeholder="you@example.com" />
      <Field label="Phone" value={booking.phone || ""} onChange={v => setBooking({ ...booking, phone: v })} placeholder="+44 7XXX XXX XXX" />
      <Field label="How did you hear about us?" value={booking.referral || ""} onChange={v => setBooking({ ...booking, referral: v })} placeholder="Instagram, a friend, our journal..." />
      <div style={{ gridColumn: "1 / -1" }}>
        <Field label="Notes for the studio" textarea value={booking.notes || ""} onChange={v => setBooking({ ...booking, notes: v })}
          placeholder="Tell us about the sitting — who's in front of the camera, the feeling you're after, anything else." />
      </div>
    </div>
  );
}

function Field({ label, value, onChange, placeholder, type = "text", textarea }) {
  return (
    <label className="field">
      <span className="field-label">{label}</span>
      {textarea ? (
        <textarea className="input" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={4} />
      ) : (
        <input className="input" type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
      )}
    </label>
  );
}

// ── Step 4: Review ───────────────────────────────────────────────────────
function StepReview({ booking, total }) {
  const s = SERVICES_CATALOG.find(s => s.id === booking.service);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <ReviewRow label="Service" value={s ? `${s.title} · ${s.duration}` : "—"} />
      <ReviewRow label="Date & time" value={booking.date ? `${booking.dateLabel} · ${booking.time}` : "—"} />
      <ReviewRow label="Contact" value={`${booking.name} · ${booking.email}${booking.phone ? " · " + booking.phone : ""}`} />
      {booking.notes && <ReviewRow label="Notes" value={booking.notes} />}
      {booking.addons?.length > 0 && (
        <ReviewRow label="Add-ons" value={booking.addons.map(a => ADDONS.find(x => x.id === a).title).join(" · ")} />
      )}
      <div style={{ marginTop: 8, paddingTop: 24, borderTop: "1px solid var(--ink)", display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <span className="mono" style={{ color: "var(--muted)" }}>Total due today</span>
        <span className="display" style={{ fontSize: 56 }}>{formatNaira(total)}</span>
      </div>
    </div>
  );
}
function ReviewRow({ label, value }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "180px 1fr", gap: 24, paddingBottom: 16, borderBottom: "1px solid var(--line)" }}>
      <span className="mono" style={{ color: "var(--muted)" }}>{label}</span>
      <span style={{ fontSize: 16 }}>{value}</span>
    </div>
  );
}

// ── Booking summary (sticky sidebar) ─────────────────────────────────────
function BookingSummary({ booking, total, sticky }) {
  const s = SERVICES_CATALOG.find(s => s.id === booking.service);
  return (
    <aside style={{ position: sticky ? "sticky" : "relative", top: sticky ? 100 : 0, alignSelf: "start" }}>
      <div className="card" style={{ padding: 28 }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 16 }}>● Your sitting</div>

        <div className="placeholder" data-label="reference moodboard"
          style={{ aspectRatio: "4/3", borderRadius: 4, marginBottom: 20 }}></div>

        <SummaryRow label="Service" value={s?.title || <em style={{ color: "var(--muted)", fontStyle: "italic" }}>Not selected</em>} />
        <SummaryRow label="Duration" value={s?.duration || "—"} />
        <SummaryRow label="Date" value={booking.dateLabel || <em style={{ color: "var(--muted)", fontStyle: "italic" }}>—</em>} />
        <SummaryRow label="Time" value={booking.time || <em style={{ color: "var(--muted)", fontStyle: "italic" }}>—</em>} />
        {booking.addons?.length > 0 && (
          <SummaryRow label="Add-ons" value={`${booking.addons.length} selected`} />
        )}

        <hr className="divider" style={{ margin: "20px 0" }} />

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <span className="mono" style={{ color: "var(--muted)" }}>Total</span>
          <span className="display" style={{ fontSize: 36 }}>{total ? formatNaira(total) : "£0"}</span>
        </div>

        <div style={{ marginTop: 24, padding: 14, background: "var(--paper-2)", borderRadius: 4, fontSize: 12, color: "var(--muted)", lineHeight: 1.55 }}>
          A 30% deposit secures your date. Final payment due 48hr before the sitting.
        </div>
      </div>
    </aside>
  );
}
function SummaryRow({ label, value }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: 14 }}>
      <span className="mono" style={{ color: "var(--muted)" }}>{label}</span>
      <span style={{ textAlign: "right", maxWidth: "60%" }}>{value}</span>
    </div>
  );
}

Object.assign(window, { BookingScreen, SERVICES_CATALOG, ADDONS });

</script>
<script type="text/babel" data-presets="react" data-src="screens/auth.jsx">
/* Ayofemi Studios — Auth (signup / login) */

function AuthScreen() {
  const { signIn, go, setToast } = useApp();
  const [mode, setMode] = React.useState("signin");
  const [form, setForm] = React.useState({ name: "", email: "", password: "" });
  const [loading, setLoading] = React.useState(false);

  const submit = (e) => {
    e?.preventDefault();
    if (mode === "signup" && !form.name) return;
    if (!form.email || !form.password) return;
    setLoading(true);
    setTimeout(() => {
      signIn({
        name: mode === "signup" ? form.name : (form.email.split("@")[0].replace(/\W/g, " ") || "Friend"),
        email: form.email,
        isAdmin: false,
      });
      setToast(mode === "signup" ? "Welcome to the studio." : "Welcome back.");
      go("dashboard");
    }, 700);
  };

  return (
    <div className="fade-in" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", minHeight: "calc(100vh - 60px)" }}>
      <div className="placeholder" data-label="studio · peckham · 04:00pm" style={{ minHeight: 600 }}></div>

      <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", padding: "60px 80px" }}>
        <div style={{ maxWidth: 420, width: "100%", margin: "0 auto" }}>
          <div className="mono" style={{ color: "var(--muted)", marginBottom: 16 }}>● {mode === "signin" ? "Sign in" : "Create account"}</div>
          <h1 className="display" style={{ fontSize: 72, margin: "0 0 12px" }}>
            {mode === "signin" ? <>Welcome <span style={{ fontStyle: "italic", color: "var(--primary)" }}>back</span>.</> : <>Make a <span style={{ fontStyle: "italic", color: "var(--primary)" }}>seat</span>.</>}
          </h1>
          <p style={{ color: "var(--muted)", marginBottom: 36, lineHeight: 1.55 }}>
            {mode === "signin" ? "Sign in to manage your sittings and revisit galleries." : "An Ayofemi account holds your sittings, your galleries, and your prints."}
          </p>

          <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 24 }}>
            {mode === "signup" && (
              <label className="field">
                <span className="field-label">Full name</span>
                <input className="input" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ayọkunle Adeyemi" />
              </label>
            )}
            <label className="field">
              <span className="field-label">Email</span>
              <input className="input" type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="you@example.com" />
            </label>
            <label className="field">
              <span className="field-label">Password</span>
              <input className="input" type="password" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} placeholder="••••••••" />
            </label>

            <button type="submit" className="btn btn-primary btn-lg" disabled={loading} style={{ marginTop: 8 }}>
              {loading ? <><span className="spinner"></span> One moment</> : (mode === "signin" ? "Sign in →" : "Create account →")}
            </button>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <button type="button" onClick={() => setMode(mode === "signin" ? "signup" : "signin")}
                style={{ fontSize: 13, color: "var(--muted)", textDecoration: "underline", textUnderlineOffset: 4 }}>
                {mode === "signin" ? "No account? Create one →" : "Already have an account? Sign in →"}
              </button>
              {mode === "signin" && <button type="button" style={{ fontSize: 13, color: "var(--muted)" }}>Forgot password?</button>}
            </div>
          </form>

          <hr className="divider" style={{ margin: "36px 0 28px" }} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <button onClick={() => { signIn({ name: "Folake Okonkwo", email: "folake@onile.studio", isAdmin: false }); go("dashboard"); }}
              className="btn btn-ghost btn-sm">Demo as Client →</button>
            <button onClick={() => { signIn({ name: "Ayofemi A.", email: "ayofemi@ayofemi.studio", isAdmin: true }); go("admin"); }}
              className="btn btn-ghost btn-sm">Demo as Admin →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { AuthScreen });

</script>
<script type="text/babel" data-presets="react" data-src="screens/dashboard.jsx">
/* Ayofemi Studios — Client dashboard */

function DashboardScreen() {
  const { user, bookings, go, signOut } = useApp();
  if (!user) {
    React.useEffect(() => go("auth"), []);
    return null;
  }

  const myBookings = bookings.filter(b => b.email === user.email);
  const upcoming = myBookings.filter(b => b.status !== "completed");
  const past = myBookings.filter(b => b.status === "completed");

  return (
    <div className="fade-in" style={{ maxWidth: 1400, margin: "0 auto", padding: "60px 32px 100px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 48 }}>
        <div>
          <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>● Your studio</div>
          <h1 className="display" style={{ fontSize: "clamp(56px, 7vw, 96px)", margin: 0 }}>
            Hello, <span style={{ fontStyle: "italic", color: "var(--primary)" }}>{user.name.split(" ")[0]}</span>.
          </h1>
        </div>
        <button onClick={signOut} className="btn btn-ghost">Sign out</button>
      </div>

      {/* Quick stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 64 }}>
        <StatCard label="Upcoming" value={upcoming.length} sub="sittings" />
        <StatCard label="Galleries" value={past.length} sub="ready to view" />
        <StatCard label="Prints" value="3" sub="in archive" />
        <StatCard label="Credit" value="£0" sub="on account" />
      </div>

      {/* Upcoming bookings */}
      <section style={{ marginBottom: 64 }}>
        <h2 className="display" style={{ fontSize: 40, margin: "0 0 24px" }}>Upcoming sittings</h2>
        {upcoming.length === 0 ? (
          <div className="card" style={{ padding: 48, textAlign: "center" }}>
            <p style={{ color: "var(--muted)", margin: "0 0 16px" }}>You don't have any sittings booked.</p>
            <button onClick={() => go("booking")} className="btn btn-primary">Book a session →</button>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {upcoming.map(b => <BookingCard key={b.id} b={b} />)}
          </div>
        )}
      </section>

      {/* Galleries */}
      <section style={{ marginBottom: 64 }}>
        <h2 className="display" style={{ fontSize: 40, margin: "0 0 24px" }}>Your galleries</h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
          <GalleryCard label="folake · home portraits" date="March 2025" count={42} />
          <GalleryCard label="onile · campaign ss25" date="January 2025" count={86} />
          <GalleryCard label="studio portraits · 2024" date="November 2024" count={28} />
        </div>
      </section>

      {/* Activity */}
      <section>
        <h2 className="display" style={{ fontSize: 40, margin: "0 0 24px" }}>Recent activity</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 0, borderTop: "1px solid var(--line)" }}>
          <Activity icon="✦" text="Gallery for the March sitting is ready" time="2 days ago" />
          <Activity icon="✦" text="Your archival prints have shipped" time="1 week ago" />
          <Activity icon="✦" text="Payment received · £150" time="3 weeks ago" />
        </div>
      </section>
    </div>
  );
}

function StatCard({ label, value, sub }) {
  return (
    <div className="card" style={{ padding: 24 }}>
      <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>{label}</div>
      <div className="display" style={{ fontSize: 56, lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 6 }}>{sub}</div>
    </div>
  );
}

function BookingCard({ b }) {
  const s = SERVICES_CATALOG.find(s => s.id === b.service);
  return (
    <div className="card" style={{ padding: 24, display: "grid", gridTemplateColumns: "120px 1fr 200px 140px", gap: 24, alignItems: "center" }}>
      <div style={{ textAlign: "center" }}>
        <div className="display" style={{ fontSize: 48, lineHeight: 1 }}>{b.date?.split("-")[2] || "—"}</div>
        <div className="mono" style={{ color: "var(--muted)", marginTop: 4 }}>{b.dateLabel?.split(",")[0] || ""}</div>
      </div>
      <div>
        <div className="display" style={{ fontSize: 24 }}>{s?.title}</div>
        <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 4 }}>{b.time} · {s?.duration} · {b.id}</div>
      </div>
      <div>
        <StatusPill status={b.status} />
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
        <button className="btn btn-ghost btn-sm">Manage</button>
      </div>
    </div>
  );
}

function StatusPill({ status }) {
  const palette = {
    pending: { bg: "var(--paper-2)", text: "var(--muted)", label: "Pending" },
    confirmed: { bg: "color-mix(in oklch, var(--accent) 30%, var(--paper))", text: "var(--ink)", label: "Confirmed" },
    completed: { bg: "var(--ink)", text: "var(--paper)", label: "Completed" },
  }[status] || { bg: "var(--paper-2)", text: "var(--muted)", label: status };
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 8,
      padding: "6px 12px", borderRadius: 999,
      background: palette.bg, color: palette.text,
      fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: palette.text, opacity: 0.7 }}></span>
      {palette.label}
    </span>
  );
}

function GalleryCard({ label, date, count }) {
  return (
    <button style={{ textAlign: "left", padding: 0, background: "none", cursor: "pointer", width: "100%" }}>
      <div className="placeholder" data-label={label} style={{ aspectRatio: "4/5", borderRadius: 4 }}></div>
      <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontWeight: 500, fontSize: 15 }}>{label}</div>
          <div className="mono" style={{ color: "var(--muted)", marginTop: 4 }}>{date}</div>
        </div>
        <div className="mono" style={{ color: "var(--muted)" }}>{count} frames</div>
      </div>
    </button>
  );
}

function Activity({ icon, text, time }) {
  return (
    <div style={{ padding: "20px 0", borderBottom: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
        <span style={{ color: "var(--primary)", fontSize: 14 }}>{icon}</span>
        <span style={{ fontSize: 15 }}>{text}</span>
      </div>
      <span className="mono" style={{ color: "var(--muted)" }}>{time}</span>
    </div>
  );
}

Object.assign(window, { DashboardScreen, StatusPill });

</script>
<script type="text/babel" data-presets="react" data-src="screens/admin.jsx">
/* Ayofemi Studios — Admin panel */

function AdminScreen() {
  const { user, services, setServices, bookings, availability, setAvailability, go, setToast } = useApp();
  const [tab, setTab] = React.useState("overview");
  const [editing, setEditing] = React.useState(null);

  if (!user || !user.isAdmin) {
    React.useEffect(() => go("auth"), []);
    return null;
  }

  return (
    <div className="fade-in" style={{ display: "grid", gridTemplateColumns: "240px 1fr", minHeight: "calc(100vh - 60px)" }}>
      {/* Sidebar */}
      <aside style={{ borderRight: "1px solid var(--line)", padding: "32px 20px", background: "var(--paper-2)" }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 20, padding: "0 12px" }}>● Studio admin</div>
        <nav style={{ display: "flex", flexDirection: "column", gap: 2 }}>
          {[
            { id: "overview", label: "Overview" },
            { id: "bookings", label: "Bookings" },
            { id: "services", label: "Services" },
            { id: "availability", label: "Availability" },
            { id: "clients", label: "Clients" },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{
                padding: "10px 12px", borderRadius: 4, textAlign: "left",
                background: tab === t.id ? "var(--ink)" : "transparent",
                color: tab === t.id ? "var(--paper)" : "var(--ink)",
                fontSize: 14, fontWeight: 500,
                transition: "background 0.15s",
              }}>{t.label}</button>
          ))}
        </nav>
        <hr className="divider" style={{ margin: "24px 0" }} />
        <div style={{ padding: "0 12px" }}>
          <div className="mono" style={{ color: "var(--muted)", marginBottom: 10 }}>Signed in</div>
          <div style={{ fontSize: 14, fontWeight: 500 }}>{user.name}</div>
          <div className="mono" style={{ color: "var(--muted)", marginTop: 4 }}>{user.email}</div>
        </div>
      </aside>

      {/* Content */}
      <main style={{ padding: "48px 56px", maxWidth: 1200 }}>
        {tab === "overview" && <AdminOverview bookings={bookings} services={services} setTab={setTab} />}
        {tab === "bookings" && <AdminBookings bookings={bookings} />}
        {tab === "services" && <AdminServices services={services} setServices={setServices} editing={editing} setEditing={setEditing} setToast={setToast} />}
        {tab === "availability" && <AdminAvailability availability={availability} setAvailability={setAvailability} setToast={setToast} />}
        {tab === "clients" && <AdminClients bookings={bookings} />}
      </main>
    </div>
  );
}

function AdminOverview({ bookings, services, setTab }) {
  return (
    <div>
      <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>● Today is May 25, 2026</div>
      <h1 className="display" style={{ fontSize: 64, margin: "0 0 40px" }}>Studio overview</h1>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 48 }}>
        <StatCard label="This month" value={bookings.length} sub="bookings" />
        <StatCard label="Revenue" value={formatNaira(bookings.reduce((s, b) => s + (b.total || 0), 0))} sub="confirmed" />
        <StatCard label="Services" value={services.length} sub="active" />
        <StatCard label="Open slots" value="14" sub="next 30 days" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 32 }}>
        <section>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h2 className="display" style={{ fontSize: 28, margin: 0 }}>Latest bookings</h2>
            <button onClick={() => setTab("bookings")} className="btn btn-ghost btn-sm">View all →</button>
          </div>
          <div className="card">
            {bookings.slice(0, 4).map((b, i) => (
              <div key={b.id} style={{ padding: 20, borderBottom: i < 3 ? "1px solid var(--line)" : "none", display: "grid", gridTemplateColumns: "1fr 1fr 1fr 100px", gap: 16, alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 500 }}>{b.name}</div>
                  <div className="mono" style={{ color: "var(--muted)", marginTop: 4 }}>{b.id}</div>
                </div>
                <div style={{ fontSize: 14 }}>{services.find(s => s.id === b.service)?.title}</div>
                <div style={{ fontSize: 14 }}>{b.dateLabel} · {b.time}</div>
                <StatusPill status={b.status} />
              </div>
            ))}
          </div>
        </section>

        <section>
          <h2 className="display" style={{ fontSize: 28, margin: "0 0 16px" }}>Quick actions</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <button onClick={() => setTab("services")} className="btn btn-ghost" style={{ justifyContent: "space-between" }}>Add new service <span>+</span></button>
            <button onClick={() => setTab("availability")} className="btn btn-ghost" style={{ justifyContent: "space-between" }}>Block a date <span>✕</span></button>
            <button className="btn btn-ghost" style={{ justifyContent: "space-between" }}>Export bookings <span>↓</span></button>
            <button className="btn btn-ghost" style={{ justifyContent: "space-between" }}>Resend confirmations <span>✦</span></button>
          </div>
        </section>
      </div>
    </div>
  );
}

function AdminBookings({ bookings }) {
  const [filter, setFilter] = React.useState("all");
  const filtered = filter === "all" ? bookings : bookings.filter(b => b.status === filter);
  return (
    <div>
      <h1 className="display" style={{ fontSize: 48, margin: "0 0 24px" }}>Bookings</h1>
      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        {["all", "pending", "confirmed", "completed"].map(f => (
          <Tag key={f} active={filter === f} onClick={() => setFilter(f)}>{f}</Tag>
        ))}
      </div>
      <div className="card">
        <div style={{ display: "grid", gridTemplateColumns: "120px 1fr 1fr 1fr 1fr 120px 100px", padding: "14px 20px", borderBottom: "1px solid var(--line)", fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)" }}>
          <span>ID</span><span>Client</span><span>Service</span><span>Date</span><span>Time</span><span>Total</span><span>Status</span>
        </div>
        {filtered.map(b => (
          <div key={b.id} style={{ display: "grid", gridTemplateColumns: "120px 1fr 1fr 1fr 1fr 120px 100px", padding: "18px 20px", borderBottom: "1px solid var(--line)", alignItems: "center", fontSize: 13 }}>
            <span className="mono">{b.id}</span>
            <span>{b.name}</span>
            <span>{SERVICES_CATALOG.find(s => s.id === b.service)?.title}</span>
            <span>{b.dateLabel}</span>
            <span>{b.time}</span>
            <span>{formatNaira(b.total || 0)}</span>
            <StatusPill status={b.status} />
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminServices({ services, setServices, editing, setEditing, setToast }) {
  const save = (s) => {
    if (s.id && services.find(x => x.id === s.id)) {
      setServices(services.map(x => x.id === s.id ? s : x));
      setToast("Service updated");
    } else {
      const id = s.title.toLowerCase().replace(/\s+/g, "-").slice(0, 24) + "-" + Math.floor(Math.random() * 99);
      setServices([...services, { ...s, id }]);
      setToast("Service added");
    }
    setEditing(null);
  };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <h1 className="display" style={{ fontSize: 48, margin: 0 }}>Services</h1>
        <button onClick={() => setEditing({ title: "", desc: "", duration: "", price: 0 })} className="btn btn-primary">+ New service</button>
      </div>
      <div className="card">
        {services.map((s, i) => (
          <div key={s.id} style={{ padding: 20, borderBottom: i < services.length - 1 ? "1px solid var(--line)" : "none", display: "grid", gridTemplateColumns: "60px 1fr 2fr 140px 120px 120px", gap: 16, alignItems: "center" }}>
            <span className="display" style={{ fontSize: 24, color: "var(--muted)" }}>{String(i + 1).padStart(2, "0")}</span>
            <span style={{ fontWeight: 500 }}>{s.title}</span>
            <span style={{ fontSize: 13, color: "var(--muted)" }}>{s.desc}</span>
            <span className="mono" style={{ color: "var(--muted)" }}>{s.duration}</span>
            <span className="display" style={{ fontSize: 20 }}>{formatNaira(s.price)}</span>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setEditing(s)} className="btn btn-ghost btn-sm">Edit</button>
              <button onClick={() => { setServices(services.filter(x => x.id !== s.id)); setToast("Service removed"); }}
                style={{ color: "var(--muted)", padding: "9px 6px", fontSize: 14 }}>✕</button>
            </div>
          </div>
        ))}
      </div>

      {editing && <ServiceEditor service={editing} onSave={save} onClose={() => setEditing(null)} />}
    </div>
  );
}

function ServiceEditor({ service, onSave, onClose }) {
  const [s, setS] = React.useState(service);
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 90, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: 540, padding: 32, background: "var(--paper)" }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 8 }}>● {service.id ? "Edit" : "New"} service</div>
        <h2 className="display" style={{ fontSize: 32, margin: "0 0 24px" }}>{service.id ? service.title : "New service"}</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <Field label="Title" value={s.title} onChange={v => setS({ ...s, title: v })} placeholder="Portrait sitting" />
          <Field label="Description" textarea value={s.desc} onChange={v => setS({ ...s, desc: v })} placeholder="Brief description" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Field label="Duration" value={s.duration} onChange={v => setS({ ...s, duration: v })} placeholder="1.5 hours" />
            <label className="field">
              <span className="field-label">Price (£)</span>
              <input className="input" type="number" value={s.price} onChange={e => setS({ ...s, price: parseInt(e.target.value || 0) })} />
            </label>
          </div>
        </div>
        <div style={{ marginTop: 32, display: "flex", justifyContent: "flex-end", gap: 10 }}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={() => onSave(s)} className="btn btn-primary">Save service</button>
        </div>
      </div>
    </div>
  );
}

function AdminAvailability({ availability, setAvailability, setToast }) {
  const [month, setMonth] = React.useState(5);
  const year = 2026;
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDay = firstDay.getDay();
  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(null);
  for (let i = 1; i <= daysInMonth; i++) cells.push(i);

  const toggle = (day) => {
    const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    setAvailability({ ...availability, [key]: !availability[key] });
    setToast(availability[key] ? "Date opened" : "Date blocked");
  };

  return (
    <div>
      <h1 className="display" style={{ fontSize: 48, margin: "0 0 8px" }}>Availability</h1>
      <p style={{ color: "var(--muted)", margin: "0 0 32px" }}>Click a date to block or open it for bookings.</p>

      <div className="card" style={{ padding: 32, maxWidth: 720 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <button onClick={() => setMonth(m => Math.max(4, m - 1))} className="btn btn-ghost btn-sm">←</button>
          <div className="display" style={{ fontSize: 32 }}>{MONTH_NAMES[month]} {year}</div>
          <button onClick={() => setMonth(m => Math.min(11, m + 1))} className="btn btn-ghost btn-sm">→</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 8 }}>
          {DAY_NAMES.map(d => <div key={d} className="mono" style={{ textAlign: "center", color: "var(--muted)", padding: "6px 0" }}>{d}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
          {cells.map((day, i) => {
            if (!day) return <div key={i}></div>;
            const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
            const blocked = availability[key];
            return (
              <button key={i} onClick={() => toggle(day)}
                style={{
                  aspectRatio: "1/1", borderRadius: 4,
                  border: `1px solid ${blocked ? "var(--ink)" : "var(--line)"}`,
                  background: blocked ? "var(--ink)" : "transparent",
                  color: blocked ? "var(--paper)" : "var(--ink)",
                  fontSize: 14, fontWeight: 500,
                  position: "relative",
                  transition: "all 0.15s",
                }}>
                {day}
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 24, marginTop: 24, paddingTop: 20, borderTop: "1px solid var(--line)", fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ width: 10, height: 10, background: "var(--ink)", borderRadius: 2 }}></span> Blocked</span>
          <span style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ width: 10, height: 10, background: "transparent", border: "1px solid var(--line)", borderRadius: 2 }}></span> Open</span>
        </div>
      </div>
    </div>
  );
}

function AdminClients({ bookings }) {
  const clients = [...new Set(bookings.map(b => b.email))].map(email => {
    const b = bookings.filter(x => x.email === email);
    return { email, name: b[0].name, count: b.length, total: b.reduce((s, x) => s + (x.total || 0), 0) };
  });
  return (
    <div>
      <h1 className="display" style={{ fontSize: 48, margin: "0 0 24px" }}>Clients</h1>
      <div className="card">
        {clients.map((c, i) => (
          <div key={c.email} style={{ padding: 20, borderBottom: i < clients.length - 1 ? "1px solid var(--line)" : "none", display: "grid", gridTemplateColumns: "60px 1fr 1fr 120px 120px", gap: 16, alignItems: "center" }}>
            <span style={{ width: 40, height: 40, borderRadius: "50%", background: "var(--paper-2)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontSize: 20 }}>{c.name[0]}</span>
            <div>
              <div style={{ fontWeight: 500 }}>{c.name}</div>
              <div className="mono" style={{ color: "var(--muted)", marginTop: 4 }}>{c.email}</div>
            </div>
            <span style={{ fontSize: 13, color: "var(--muted)" }}>{c.count} {c.count === 1 ? "booking" : "bookings"}</span>
            <span style={{ fontWeight: 500 }}>{formatNaira(c.total)}</span>
            <button className="btn btn-ghost btn-sm">View →</button>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { AdminScreen });

</script>
<script type="text/babel" data-presets="react" data-src="screens/checkout.jsx">
/* Ayofemi Studios — Checkout (sandbox payment UI) */

function CheckoutScreen() {
  const { booking, setBookings, bookings, go, setToast, user } = useApp();
  const [gateway, setGateway] = React.useState("stripe");
  const [card, setCard] = React.useState({ number: "4084 0840 8408 4081", expiry: "09/27", cvv: "408", name: user?.name || "" });
  const [phase, setPhase] = React.useState("form"); // form | processing | otp | done
  const [otp, setOtp] = React.useState("");

  const service = SERVICES_CATALOG.find(s => s.id === booking.service);
  const deposit = Math.round((booking.total || 0) * 0.3);

  React.useEffect(() => {
    if (!booking.service) go("booking");
  }, []);

  const pay = () => {
    setPhase("processing");
    setTimeout(() => setPhase("otp"), 1400);
  };

  const verify = () => {
    setPhase("processing");
    setTimeout(() => {
      setBookings([...bookings, { ...booking, status: "confirmed", paidAt: new Date().toISOString() }]);
      setPhase("done");
      setTimeout(() => go("confirmation"), 900);
    }, 1200);
  };

  return (
    <div className="fade-in" style={{ maxWidth: 1200, margin: "0 auto", padding: "40px 32px 80px" }}>
      <button onClick={() => go("booking")} className="mono" style={{ color: "var(--muted)", marginBottom: 24 }}>← Back to booking</button>

      <div style={{ marginBottom: 40 }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>● Secure checkout · sandbox mode</div>
        <h1 className="display" style={{ fontSize: "clamp(48px, 6vw, 80px)", margin: 0 }}>
          One <span style={{ fontStyle: "italic", color: "var(--primary)" }}>last</span> step.
        </h1>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 420px", gap: 48 }}>
        <div>
          {/* Gateway selector */}
          <div style={{ marginBottom: 32 }}>
            <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>Payment gateway</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {[
                { id: "stripe", name: "Stripe", sub: "Cards · Apple Pay · Google Pay" },
                { id: "paystack", name: "Paystack", sub: "Cards · Bank · Transfer" },
              ].map(g => (
                <button key={g.id} onClick={() => setGateway(g.id)}
                  style={{
                    padding: 20, borderRadius: 6,
                    border: `1px solid ${gateway === g.id ? "var(--ink)" : "var(--line)"}`,
                    background: gateway === g.id ? "var(--paper-2)" : "transparent",
                    textAlign: "left", cursor: "pointer", display: "flex", flexDirection: "column", gap: 4,
                  }}>
                  <div style={{ fontWeight: 600, fontSize: 16 }}>{g.name}</div>
                  <div className="mono" style={{ color: "var(--muted)" }}>{g.sub}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Payment form */}
          <div className="card" style={{ padding: 32 }}>
            {phase === "form" && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                  <h2 className="display" style={{ fontSize: 28, margin: 0 }}>Card details</h2>
                  <span className="mono" style={{ color: "var(--muted)" }}>🔒 Sandbox · no real charge</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
                  <Field label="Card number" value={card.number} onChange={v => setCard({ ...card, number: v })} placeholder="4084 0840 8408 4081" />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr", gap: 16 }}>
                    <Field label="Expiry" value={card.expiry} onChange={v => setCard({ ...card, expiry: v })} placeholder="MM/YY" />
                    <Field label="CVV" value={card.cvv} onChange={v => setCard({ ...card, cvv: v })} placeholder="408" />
                    <Field label="Name on card" value={card.name} onChange={v => setCard({ ...card, name: v })} placeholder="—" />
                  </div>
                </div>

                <div style={{ marginTop: 24, padding: 14, background: "var(--paper-2)", borderRadius: 4, fontSize: 12, color: "var(--muted)", lineHeight: 1.6 }}>
                  Test card <code style={{ fontFamily: "var(--font-mono)" }}>4084 0840 8408 4081</code> · any future expiry · CVV <code style={{ fontFamily: "var(--font-mono)" }}>408</code>. This is a sandbox flow — no funds move.
                </div>

                <div style={{ marginTop: 24, display: "flex", gap: 12, alignItems: "center" }}>
                  <button onClick={pay} className="btn btn-primary btn-lg" style={{ flex: 1 }}>
                    Pay {formatNaira(deposit)} now →
                  </button>
                </div>
              </>
            )}

            {phase === "processing" && (
              <div style={{ padding: "60px 0", textAlign: "center" }}>
                <div className="spinner" style={{ width: 32, height: 32, borderWidth: 3, color: "var(--primary)" }}></div>
                <div className="display" style={{ fontSize: 28, marginTop: 24 }}>Talking to {gateway === "stripe" ? "Stripe" : "Paystack"}…</div>
                <div className="mono" style={{ color: "var(--muted)", marginTop: 8 }}>● Sandbox transaction in flight</div>
              </div>
            )}

            {phase === "otp" && (
              <div>
                <div className="mono" style={{ color: "var(--muted)", marginBottom: 8 }}>● 3-D Secure</div>
                <h2 className="display" style={{ fontSize: 28, margin: "0 0 12px" }}>Enter the OTP</h2>
                <p style={{ color: "var(--muted)", margin: "0 0 24px", fontSize: 14 }}>
                  Your bank sent a code to the number ending in <strong>**42</strong>. In sandbox, use <code style={{ fontFamily: "var(--font-mono)", background: "var(--paper-2)", padding: "2px 6px", borderRadius: 3 }}>123456</code>.
                </p>
                <input className="input input-box" value={otp} onChange={e => setOtp(e.target.value)} placeholder="6-digit code"
                  maxLength={6} style={{ fontFamily: "var(--font-mono)", fontSize: 22, letterSpacing: "0.4em", textAlign: "center" }} />
                <button onClick={verify} className="btn btn-primary btn-lg"
                  disabled={otp.length < 4}
                  style={{ marginTop: 20, width: "100%", opacity: otp.length < 4 ? 0.4 : 1 }}>
                  Verify & confirm →
                </button>
              </div>
            )}

            {phase === "done" && (
              <div style={{ padding: "40px 0", textAlign: "center" }}>
                <div style={{ width: 56, height: 56, borderRadius: "50%", background: "var(--primary)", color: "var(--primary-ink)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>✓</div>
                <div className="display" style={{ fontSize: 36, marginTop: 20 }}>Paid.</div>
                <div className="mono" style={{ color: "var(--muted)", marginTop: 8 }}>Redirecting…</div>
              </div>
            )}
          </div>
        </div>

        {/* Order summary */}
        <aside>
          <div className="card" style={{ padding: 28, position: "sticky", top: 100 }}>
            <div className="mono" style={{ color: "var(--muted)", marginBottom: 16 }}>● Order summary</div>

            <div style={{ marginBottom: 20 }}>
              <div className="display" style={{ fontSize: 24 }}>{service?.title}</div>
              <div className="mono" style={{ color: "var(--muted)", marginTop: 6 }}>{booking.dateLabel} · {booking.time}</div>
            </div>

            <hr className="divider" />

            <div style={{ padding: "16px 0", display: "flex", flexDirection: "column", gap: 10, fontSize: 14 }}>
              <Line label={service?.title} value={formatNaira(service?.price || 0)} />
              {(booking.addons || []).map(aid => {
                const a = ADDONS.find(x => x.id === aid);
                return <Line key={aid} label={a.title} value={formatNaira(a.price)} />;
              })}
            </div>

            <hr className="divider" />

            <div style={{ padding: "16px 0", display: "flex", flexDirection: "column", gap: 10, fontSize: 14 }}>
              <Line label="Subtotal" value={formatNaira(booking.total || 0)} />
              <Line label="VAT (20%)" value="Included" muted />

            </div>
          </div>
        </aside>
      </div>
    </div>
  );
}

function Line({ label, value, bold, muted }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", color: muted ? "var(--muted)" : "var(--ink)", fontWeight: bold ? 600 : 400 }}>

      <span>{value}</span>
    </div>

}

Object.assign(window, { CheckoutScreen });

</script>

<script type="text/babel" data-presets="react" data-src="app.jsx">
/* Ayofemi Studios — App shell, routing, state, tweaks */
const { useState: useS, useEffect: useE, useMemo: useM } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "oxblood",
  "fonts": "editorial",
  "mode": "light",
  "bookingStyle": "stepper",
  "heroVariant": "editorial"
}/*EDITMODE-END*/;

// Seed bookings for demo
const SEED_BOOKINGS = [
  { id: "AYO-4821", name: "Folake Okonkwo", email: "folake@onile.studio", service: "wedding-full", date: "2026-06-12", dateLabel: "Jun 12, 2026", time: "10:30", total: 1650, status: "confirmed", addons: ["drone"] },
  { id: "AYO-4818", name: "Kemi Adesanya", email: "kemi@adesanya.co", service: "wedding-luxury", date: "2026-07-04", dateLabel: "Jul 4, 2026", time: "09:00", total: 3100, status: "pending", addons: ["rush"] },
  { id: "AYO-4815", name: "Tom Bardsley", email: "tom@bardsley.works", service: "headshots", date: "2026-06-02", dateLabel: "Jun 2, 2026", time: "14:30", total: 75, status: "confirmed" },
  { id: "AYO-4810", name: "Ada Eze", email: "ada@iridae.studio", service: "event", date: "2026-05-30", dateLabel: "May 30, 2026", time: "13:00", total: 500, status: "completed", addons: ["album"] },
  { id: "AYO-4805", name: "Folake Okonkwo", email: "folake@onile.studio", service: "portrait", date: "2026-04-18", dateLabel: "Apr 18, 2026", time: "16:00", total: 150, status: "completed" },
];

function App() {
  // Tweaks
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Routing
  const [route, setRoute] = useS("home");
  const go = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: "instant" }); };

  // Auth
  const [user, setUser] = useS(null);
  const signIn = (u) => setUser(u);
  const signOut = () => { setUser(null); go("home"); };

  // Booking state
  const [booking, setBooking] = useS({});
  const [bookings, setBookings] = useS(SEED_BOOKINGS);

  // Services (admin-editable)
  const [services, setServices] = useS(SERVICES_CATALOG);

  // Availability (admin-editable)
  const [availability, setAvailability] = useS({});

  // Toast
  const [toast, setToast] = useS(null);
  useE(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2400);
    return () => clearTimeout(t);
  }, [toast]);

  // Apply palette/fonts/mode to <html>
  useE(() => {
    const root = document.documentElement;
    root.setAttribute("data-palette", tweaks.palette);
    root.setAttribute("data-fonts", tweaks.fonts);
    root.setAttribute("data-mode", tweaks.mode);
  }, [tweaks.palette, tweaks.fonts, tweaks.mode]);

  // Helper: jump to booking with a pre-selected service
  const goWithService = (serviceId) => {
    setBooking({ ...booking, service: serviceId });
    go("booking");
  };

  const ctx = {
    route, go, goWithService,
    user, signIn, signOut,
    booking, setBooking,
    bookings, setBookings,
    services, setServices,
    availability, setAvailability,
    toast, setToast,
    tweaks, setTweak,
  };

  return (
    <AppContext.Provider value={ctx}>
      <div className="app-shell" data-screen-label={"Screen: " + route}>
        {route !== "auth" && <NavBar />}
        <main style={{ flex: 1 }}>
          {route === "home" && <HomeScreen heroVariant={tweaks.heroVariant} />}
          {route === "portfolio" && <PortfolioScreen />}
          {route === "booking" && <BookingScreen style={tweaks.bookingStyle} />}
          {route === "auth" && <AuthScreen />}
          {route === "dashboard" && <DashboardScreen />}
          {route === "admin" && <AdminScreen />}
          {route === "checkout" && <CheckoutScreen />}
          {route === "confirmation" && <ConfirmationScreen />}
        </main>
        {!["auth", "admin", "checkout"].includes(route) && <Footer />}
      </div>

      <Toast toast={toast} />

      <AyofemiTweaks tweaks={tweaks} setTweak={setTweak} go={go} route={route} />
    </AppContext.Provider>
  );
}

// ─── Tweaks panel ────────────────────────────────────────────────────────
function AyofemiTweaks({ tweaks, setTweak, go, route }) {
  return (
    <TweaksPanel>
      <TweakSection label="Aesthetic">
        <TweakSelect
          label="Palette"
          value={tweaks.palette}
          onChange={(v) => setTweak("palette", v)}
          options={[
            { value: "oxblood", label: "Oxblood · burgundy + cream + amber" },
            { value: "midnight", label: "Midnight · ink + champagne + coral" },
            { value: "ochre", label: "Ochre · earth + bone + emerald" },
          ]}
        />
        <TweakSelect
          label="Font pairing"
          value={tweaks.fonts}
          onChange={(v) => setTweak("fonts", v)}
          options={[
            { value: "editorial", label: "Editorial · Instrument Serif + DM Sans" },
            { value: "modernist", label: "Modernist · Space Grotesk" },
            { value: "classical", label: "Classical · Playfair + Work Sans" },
          ]}
        />
        <TweakRadio
          label="Mode"
          value={tweaks.mode}
          onChange={(v) => setTweak("mode", v)}
          options={[
            { value: "light", label: "Light" },
            { value: "dark", label: "Dark" },
          ]}
        />
      </TweakSection>

      <TweakSection label="Layout">
        <TweakSelect
          label="Hero variant"
          value={tweaks.heroVariant}
          onChange={(v) => { setTweak("heroVariant", v); go("home"); }}
          options={[
            { value: "editorial", label: "Editorial · oversized type" },
            { value: "split", label: "Split · image + copy" },
            { value: "marquee", label: "Marquee · scrolling frames" },
          ]}
        />
        <TweakRadio
          label="Booking flow"
          value={tweaks.bookingStyle}
          onChange={(v) => { setTweak("bookingStyle", v); if (route === "booking") go("booking"); }}
          options={[
            { value: "stepper", label: "Stepper" },
            { value: "single", label: "Single page" },
          ]}
        />
      </TweakSection>

      <TweakSection label="Jump to a screen">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
          {[
            ["home", "Home"],
            ["portfolio", "Portfolio"],
            ["booking", "Booking"],
            ["auth", "Sign in"],
            ["dashboard", "Dashboard"],
            ["admin", "Admin"],
            ["checkout", "Checkout"],
            ["confirmation", "Confirmation"],
          ].map(([id, label]) => (
            <button key={id} onClick={() => go(id)}
              style={{
                padding: "8px 10px", borderRadius: 4,
                border: "1px solid " + (route === id ? "var(--ink)" : "var(--line)"),
                background: route === id ? "var(--ink)" : "transparent",
                color: route === id ? "var(--paper)" : "var(--ink)",
                fontSize: 12, textAlign: "left", cursor: "pointer",
              }}>{label}</button>
          ))}
        </div>
      </TweakSection>
    </TweaksPanel>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>
</body>
