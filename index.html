/* Ayofemi Studios — Design tokens & base */

:root {
  /* PALETTE: OXBLOOD (default) */
  --ink: oklch(0.18 0.02 30);
  --paper: oklch(0.96 0.015 75);
  --paper-2: oklch(0.92 0.02 75);
  --paper-3: oklch(0.88 0.025 75);
  --primary: oklch(0.32 0.11 25);
  --primary-ink: oklch(0.96 0.015 75);
  --accent: oklch(0.68 0.16 55);
  --muted: oklch(0.45 0.02 30);
  --line: oklch(0.85 0.02 75);
  --shadow: 0 1px 0 oklch(0.85 0.02 75 / 0.7);

  /* TYPE */
  --font-display: "Instrument Serif", "Times New Roman", serif;
  --font-body: "DM Sans", "Helvetica Neue", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

/* PALETTE: MIDNIGHT */
[data-palette="midnight"] {
  --ink: oklch(0.94 0.01 80);
  --paper: oklch(0.16 0.015 250);
  --paper-2: oklch(0.21 0.02 250);
  --paper-3: oklch(0.26 0.02 250);
  --primary: oklch(0.88 0.07 75);
  --primary-ink: oklch(0.16 0.015 250);
  --accent: oklch(0.72 0.18 25);
  --muted: oklch(0.65 0.02 250);
  --line: oklch(0.3 0.02 250);
  --shadow: 0 1px 0 oklch(0.3 0.02 250 / 0.6);
}

/* PALETTE: OCHRE */
[data-palette="ochre"] {
  --ink: oklch(0.22 0.03 60);
  --paper: oklch(0.94 0.025 85);
  --paper-2: oklch(0.89 0.03 85);
  --paper-3: oklch(0.84 0.04 85);
  --primary: oklch(0.65 0.13 65);
  --primary-ink: oklch(0.18 0.02 60);
  --accent: oklch(0.45 0.1 160);
  --muted: oklch(0.45 0.03 60);
  --line: oklch(0.82 0.04 85);
}

/* DARK MODE — applies to whichever palette is active */
[data-mode="dark"] {
  --ink: oklch(0.95 0.015 80);
  --paper: oklch(0.14 0.012 30);
  --paper-2: oklch(0.18 0.015 30);
  --paper-3: oklch(0.22 0.02 30);
  --muted: oklch(0.68 0.02 30);
  --line: oklch(0.28 0.02 30);
}
[data-mode="dark"][data-palette="oxblood"] {
  --primary: oklch(0.55 0.14 25);
  --primary-ink: oklch(0.96 0.015 75);
  --accent: oklch(0.75 0.16 60);
}
[data-mode="dark"][data-palette="ochre"] {
  --primary: oklch(0.72 0.14 65);
  --primary-ink: oklch(0.16 0.012 60);
  --accent: oklch(0.7 0.12 160);
}

/* FONT PAIRINGS */
[data-fonts="editorial"] {
  --font-display: "Instrument Serif", serif;
  --font-body: "DM Sans", sans-serif;
}
[data-fonts="modernist"] {
  --font-display: "Space Grotesk", sans-serif;
  --font-body: "Space Grotesk", sans-serif;
}
[data-fonts="classical"] {
  --font-display: "Playfair Display", serif;
  --font-body: "Work Sans", sans-serif;
}

/* RESET */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background 0.4s ease, color 0.4s ease;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea, select { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* TYPE UTILITIES */
.display { font-family: var(--font-display); font-weight: 400; line-height: 0.92; letter-spacing: -0.02em; }
.mono { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
.italic { font-style: italic; }

/* STRIPED PLACEHOLDER */
.placeholder {
  position: relative;
  background:
    repeating-linear-gradient(
      135deg,
      var(--paper-2) 0,
      var(--paper-2) 12px,
      var(--paper-3) 12px,
      var(--paper-3) 24px
    );
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  overflow: hidden;
}
.placeholder::after {
  content: attr(data-label);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--paper);
  padding: 4px 8px;
  margin: 10px;
  border: 1px solid var(--line);
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 22px;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 0.01em;
  border-radius: 999px;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  white-space: nowrap;
  border: 1px solid transparent;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--primary);
  color: var(--primary-ink);
}
.btn-primary:hover { background: var(--ink); color: var(--paper); }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border-color: var(--line);
}
.btn-ghost:hover { border-color: var(--ink); }
.btn-dark {
  background: var(--ink);
  color: var(--paper);
}
.btn-dark:hover { background: var(--primary); color: var(--primary-ink); }
.btn-sm { padding: 9px 14px; font-size: 12px; }
.btn-lg { padding: 18px 28px; font-size: 15px; }

/* INPUTS */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 10px 0;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s ease;
  color: var(--ink);
  width: 100%;
}
.input:focus { border-bottom-color: var(--ink); }
.input::placeholder { color: var(--muted); opacity: 0.6; }
.input-box {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 12px 14px;
}
.input-box:focus { border-color: var(--ink); }

textarea.input { resize: vertical; min-height: 80px; }

/* CARD */
.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 6px;
}

/* MISC */
.divider {
  height: 1px;
  background: var(--line);
  border: 0;
  margin: 0;
}
.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn 0.4s ease both; }

/* APP LAYOUT */
#app { min-height: 100vh; display: flex; flex-direction: column; }
.app-shell { flex: 1; display: flex; flex-direction: column; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* SELECTION */
::selection { background: var(--primary); color: var(--primary-ink); }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-presets="react" data-src="screens/portfolio.jsx">
/* Ayofemi Studios — Portfolio with lightbox */
const PORTFOLIO = [
  { id: 1, cat: "portraits", label: "folake · 2025", aspect: "4/5" },
  { id: 2, cat: "portraits", label: "ada · home series", aspect: "3/4" },
  { id: 3, cat: "portraits", label: "tom · peckham", aspect: "1/1" },
  { id: 4, cat: "editorial", label: "iron & velvet · vogue", aspect: "3/4" },
  { id: 5, cat: "editorial", label: "london fw · backstage", aspect: "4/5" },
  { id: 6, cat: "editorial", label: "onile ss26", aspect: "16/9" },
  { id: 7, cat: "weddings", label: "tunde & ada", aspect: "4/5" },
  { id: 8, cat: "weddings", label: "kemi & ola · oniru", aspect: "3/4" },
  { id: 9, cat: "weddings", label: "the dance floor", aspect: "1/1" },
  { id: 10, cat: "portraits", label: "studio sitting · 03", aspect: "4/5" },
  { id: 11, cat: "editorial", label: "the harmattan issue", aspect: "3/4" },
  { id: 12, cat: "weddings", label: "the slow morning", aspect: "16/9" },
];
const CATS = ["all", "portraits", "editorial", "weddings"];

function PortfolioScreen() {
  const [cat, setCat] = React.useState("all");
  const [lightbox, setLightbox] = React.useState(null);
  const filtered = cat === "all" ? PORTFOLIO : PORTFOLIO.filter(p => p.cat === cat);

  React.useEffect(() => {
    if (!lightbox) return;
    const handler = (e) => {
      if (e.key === "Escape") setLightbox(null);
      if (e.key === "ArrowRight") setLightbox(l => {
        const idx = filtered.findIndex(p => p.id === l.id);
        return filtered[(idx + 1) % filtered.length];
      });
      if (e.key === "ArrowLeft") setLightbox(l => {
        const idx = filtered.findIndex(p => p.id === l.id);
        return filtered[(idx - 1 + filtered.length) % filtered.length];
      });
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [lightbox, filtered]);

  return (
    <div className="fade-in" style={{ maxWidth: 1400, margin: "0 auto", padding: "60px 32px 80px" }}>
      <div style={{ marginBottom: 40 }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 16 }}>● Portfolio · {filtered.length} frames</div>
        <h1 className="display" style={{ fontSize: "clamp(60px, 8vw, 128px)", margin: 0 }}>
          The <span style={{ fontStyle: "italic", color: "var(--primary)" }}>archive</span>
        </h1>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 48, flexWrap: "wrap" }}>
        {CATS.map(c => (
          <Tag key={c} active={cat === c} onClick={() => setCat(c)}>
            {c.charAt(0).toUpperCase() + c.slice(1)}
            {c !== "all" && <span style={{ color: cat === c ? "color-mix(in oklch, var(--paper) 60%, transparent)" : "var(--muted)", marginLeft: 6 }}>· {PORTFOLIO.filter(p => p.cat === c).length}</span>}
          </Tag>
        ))}
      </div>

      <div style={{
        columnCount: 3, columnGap: 16,
      }} className="portfolio-grid">
        {filtered.map((p, i) => (
          <button key={p.id} onClick={() => setLightbox(p)}
            style={{
              breakInside: "avoid", display: "block", width: "100%", marginBottom: 16,
              padding: 0, border: 0, background: "none", cursor: "zoom-in",
              animation: `fadeIn 0.4s ease ${i * 0.04}s both`,
            }}>
            <div className="placeholder" data-label={p.label}
              style={{ aspectRatio: p.aspect, width: "100%", borderRadius: 4, transition: "transform 0.4s ease" }}
              onMouseEnter={(e) => e.currentTarget.style.transform = "scale(0.98)"}
              onMouseLeave={(e) => e.currentTarget.style.transform = "none"}
            ></div>
            <div style={{ marginTop: 10, display: "flex", justifyContent: "space-between", fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)" }}>
              <span>{p.label}</span>
              <span>{String(p.id).padStart(3, "0")}</span>
            </div>
          </button>
        ))}
      </div>

      {lightbox && <Lightbox item={lightbox} onClose={() => setLightbox(null)} all={filtered} setItem={setLightbox} />}
    </div>
  );
}

function Lightbox({ item, onClose, all, setItem }) {
  const idx = all.findIndex(p => p.id === item.id);
  const next = () => setItem(all[(idx + 1) % all.length]);
  const prev = () => setItem(all[(idx - 1 + all.length) % all.length]);
  return (
    <div onClick={onClose} className="fade-in" style={{
      position: "fixed", inset: 0, background: "color-mix(in oklch, var(--ink) 92%, transparent)",
      zIndex: 80, display: "flex", flexDirection: "column",
    }}>
      <div style={{ padding: "20px 32px", display: "flex", justifyContent: "space-between", alignItems: "center", color: "var(--paper)" }}>
        <div className="mono" style={{ color: "color-mix(in oklch, var(--paper) 70%, transparent)" }}>
          {String(idx + 1).padStart(2, "0")} / {String(all.length).padStart(2, "0")} · {item.label}
        </div>
        <button onClick={onClose} style={{ color: "var(--paper)", fontSize: 24, lineHeight: 1, padding: 8 }}>×</button>
      </div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 80px 60px", position: "relative" }}>
        <button onClick={(e) => { e.stopPropagation(); prev(); }}
          style={{ position: "absolute", left: 24, color: "var(--paper)", fontSize: 28, padding: 16 }}>←</button>
        <div onClick={(e) => e.stopPropagation()} className="placeholder" data-label={item.label}
          style={{ aspectRatio: item.aspect, maxHeight: "80vh", maxWidth: "min(1100px, 90vw)", height: "80vh", borderRadius: 4 }}></div>
        <button onClick={(e) => { e.stopPropagation(); next(); }}
          style={{ position: "absolute", right: 24, color: "var(--paper)", fontSize: 28, padding: 16 }}>→</button>
      </div>
    </div>
  );
}

Object.assign(window, { PortfolioScreen });

</script>
<script type="text/babel" data-presets="react" data-src="screens/booking.jsx">
/* Ayofemi Studios — Booking flow (stepper + single-page variants) */

const SERVICES_CATALOG = [
  { id: "wedding-half", title: "Wedding — half day", duration: "Up to 5 hours", price: 800, desc: "Ceremony and key moments, one photographer", colorTag: "wedding" },

  { id: "portrait", title: "Portrait session", duration: "1 hour", price: 150, desc: "Studio sitting with edited frames", colorTag: "portrait" },

  { id: "headshots", title: "Corporate headshots", duration: "Per person", price: 75, desc: "Clean, consistent team portraits", colorTag: "commercial" },
  { id: "product", title: "Product photography", duration: "Per image", price: 15, desc: "E-commerce & catalogue · £15–£30 / image", colorTag: "commercial" },
];

const ADDONS = [
  { id: "hour", title: "Additional hour coverage", desc: "Extend the shoot · £100–£150 / hour", price: 100 },
  { id: "drone", title: "Drone photography", desc: "Aerial coverage · £150–£300", price: 150 },
  { id: "album", title: "Photo album", desc: "Hand-bound album · from £150", price: 150 },
  { id: "canvas", title: "Canvas print", desc: "Framed canvas · from £40", price: 40 },
  { id: "extra", title: "Extra edited images", desc: "Per additional edit · £10–£20", price: 15 },
  { id: "rush", title: "Rush delivery", desc: "Final selects in 72 hours", price: 100 },
];

function nextDays(n) {
  const out = [];
  const today = new Date(2026, 4, 25); // May 25 2026
  for (let i = 0; i < n; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    out.push(d);
  }
  return out;
}
const DAY_NAMES = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
const TIME_SLOTS = ["09:00", "10:30", "13:00", "14:30", "16:00", "17:30"];

function BookingScreen({ style = "stepper" }) {
  if (style === "single") return <BookingSinglePage />;
  return <BookingStepper />;
}

// ── STEPPER VARIANT ──────────────────────────────────────────────────────
function BookingStepper() {
  const { booking, setBooking, go, user, setToast } = useApp();
  const [step, setStep] = React.useState(1);

  const steps = ["Service", "Date & time", "Details", "Review"];

  const canNext = () => {
    if (step === 1) return !!booking.service;
    if (step === 2) return !!booking.date && !!booking.time;
    if (step === 3) return booking.name && booking.email;
    return true;
  };

  const total = (() => {
    const s = SERVICES_CATALOG.find(s => s.id === booking.service);
    const base = s ? s.price : 0;
    const addons = (booking.addons || []).reduce((sum, a) => sum + (ADDONS.find(x => x.id === a)?.price || 0), 0);
    return base + addons;
  })();

  const submit = () => {
    setBooking({ ...booking, total, id: "AYO-" + Math.floor(Math.random() * 9000 + 1000), status: "pending" });
    go("checkout");
  };

  return (
    <div className="fade-in" style={{ maxWidth: 1400, margin: "0 auto", padding: "60px 32px 100px" }}>
      <div style={{ marginBottom: 40 }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>● Book a session · stepper</div>
        <h1 className="display" style={{ fontSize: "clamp(56px, 7vw, 96px)", margin: 0 }}>
          Reserve a <span style={{ fontStyle: "italic", color: "var(--primary)" }}>date</span>.
        </h1>
      </div>

      {/* Step progress */}
      <div style={{ display: "flex", gap: 0, marginBottom: 48, borderBottom: "1px solid var(--line)" }}>
        {steps.map((label, i) => {
          const n = i + 1;
          const active = step === n;
          const done = step > n;
          return (
            <button key={label} onClick={() => done && setStep(n)}
              style={{
                flex: 1, padding: "16px 8px", textAlign: "left",
                borderBottom: active ? "2px solid var(--ink)" : "2px solid transparent",
                marginBottom: -1, cursor: done ? "pointer" : "default",
                opacity: !active && !done ? 0.45 : 1,
              }}>
              <div className="mono" style={{ color: "var(--muted)", marginBottom: 6 }}>Step {String(n).padStart(2, "0")}</div>
              <div className="display" style={{ fontSize: 22 }}>{label}</div>
            </button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 64 }}>
        <div>
          {step === 1 && <StepService booking={booking} setBooking={setBooking} />}
          {step === 2 && <StepDateTime booking={booking} setBooking={setBooking} />}
          {step === 3 && <StepDetails booking={booking} setBooking={setBooking} user={user} />}
          {step === 4 && <StepReview booking={booking} total={total} />}

          <div style={{ marginTop: 40, display: "flex", gap: 12, justifyContent: "space-between" }}>
            <button onClick={() => setStep(s => Math.max(1, s - 1))} className="btn btn-ghost" disabled={step === 1} style={{ opacity: step === 1 ? 0.3 : 1 }}>← Back</button>
            {step < 4 ? (
              <button onClick={() => canNext() && setStep(s => s + 1)} className="btn btn-primary btn-lg" disabled={!canNext()} style={{ opacity: canNext() ? 1 : 0.4, cursor: canNext() ? "pointer" : "not-allowed" }}>
                Continue →
              </button>
            ) : (
              <button onClick={submit} className="btn btn-primary btn-lg">Confirm & pay →</button>
            )}
          </div>
        </div>

        <BookingSummary booking={booking} total={total} />
      </div>
    </div>
  );
}

// ── SINGLE-PAGE VARIANT ──────────────────────────────────────────────────
function BookingSinglePage() {
  const { booking, setBooking, go, user } = useApp();

  const total = (() => {
    const s = SERVICES_CATALOG.find(s => s.id === booking.service);
    const base = s ? s.price : 0;
    const addons = (booking.addons || []).reduce((sum, a) => sum + (ADDONS.find(x => x.id === a)?.price || 0), 0);
    return base + addons;
  })();

  const canSubmit = booking.service && booking.date && booking.time && booking.name && booking.email;

  const submit = () => {
    if (!canSubmit) return;
    setBooking({ ...booking, total, id: "AYO-" + Math.floor(Math.random() * 9000 + 1000), status: "pending" });
    go("checkout");
  };

  return (
    <div className="fade-in" style={{ maxWidth: 1400, margin: "0 auto", padding: "60px 32px 100px" }}>
      <div style={{ marginBottom: 60 }}>
        <div className="mono" style={{ color: "var(--muted)", marginBottom: 12 }}>● Book a session</div>
        <h1 className="display" style={{ fontSize: "clamp(56px, 7vw, 96px)", margin: 0 }}>
          One <span style={{ fontStyle: "italic", color: "var(--primary)" }}>page</span>, one sitting.
        </h1>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 64 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 64 }}>

              Continue to checkout →
            </button>
          </div>
        </div>

        <BookingSummary booking={booking} total={total} sticky />
      </div>
    </div>
  );
}

function Block({ num, title, children }) {
